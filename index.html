/* ==========================================================================
Base Styles & Variables
========================================================================== */
:root {
    --bg-primary: #080b16;
    --bg-secondary: rgba(15, 22, 42, 0.6);
    --border-color: rgba(255, 255, 255, 0.08);
    --border-highlight: rgba(255, 255, 255, 0.15);
    
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    
    --accent-primary: #6366f1; /* Indigo */
    --accent-secondary: #a855f7; /* Purple */
    --accent-glow: rgba(99, 102, 241, 0.5);
    
    --success: #10b981; /* Emerald */
    --danger: #ef4444; /* Red */
    
    --card-bg: rgba(17, 24, 39, 0.45);
    --card-backdrop: blur(20px);
    --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    
    --font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
    --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-family);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    line-height: 1.6;
}

/* ==========================================================================
Background Decorative Elements (Premium Glow)
========================================================================== */
.background-decor {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
    overflow: hidden;
}

.glow-sphere {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
}

.sphere-1 {
    top: -10%;
    right: 10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, var(--accent-secondary) 0%, transparent 70%);
}

.sphere-2 {
    bottom: 10%;
    left: -10%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, var(--accent-primary) 0%, transparent 70%);
}

/* ==========================================================================
Layout
========================================================================== */
.app-container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    gap: 2rem;
}

header {
    text-align: center;
    margin-bottom: 1rem;
}

.logo {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
}

.logo-icon {
    width: 2.5rem;
    height: 2.5rem;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    -webkit-background-clip: text;
    background-clip: text;
    filter: drop-shadow(0 0 8px var(--accent-glow));
}

header h1 {
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--text-primary) 30%, #cbd5e1 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    color: var(--text-secondary);
    font-size: 1.05rem;
    font-weight: 400;
}

.grid-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 2rem;
    align-items: start;
}

.control-panel {
    display: none !important;
}

/* ==========================================================================
Glassmorphism Cards
========================================================================== */
.glass-card {
    background: var(--card-bg);
    backdrop-filter: var(--card-backdrop);
    -webkit-backdrop-filter: var(--card-backdrop);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 2rem;
    box-shadow: var(--card-shadow);
    transition: var(--transition-smooth);
}

.glass-card:hover {
    border-color: rgba(255, 255, 255, 0.12);
}

.card-header-actions {
    display: flex;
    justify-content: center;
    width: 100%;
    margin-bottom: 1rem;
}

/* ==========================================================================
Buttons
========================================================================== */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.75rem 1.5rem;
    border-radius: 12px;
    font-family: var(--font-family);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: var(--transition-smooth);
}

.btn-primary {
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    color: white;
}

.btn-glow {
    position: relative;
    box-shadow: 0 4px 20px 0 var(--accent-glow);
}

.btn-glow:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px 0 rgba(99, 102, 241, 0.7);
}

.btn-glow:active {
    transform: translateY(0);
}

.btn-large-run {
    padding: 1.25rem 3.5rem;
    font-size: 1.3rem;
    border-radius: 16px;
    letter-spacing: 0.05em;
}

.btn-large-copy {
    background: rgba(255, 255, 255, 0.08);
    color: var(--text-primary);
    border: 1px solid var(--border-highlight);
    padding: 1.1rem;
    font-size: 1.1rem;
    width: 100%;
    margin-bottom: 0.75rem;
    border-radius: 12px;
}

.btn-large-copy:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.18);
    border-color: rgba(255, 255, 255, 0.3);
    transform: translateY(-1px);
}

.btn-large-copy:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
}

/* ==========================================================================
Result Output Panel
========================================================================== */
.result-panel {
    display: flex;
    flex-direction: column;
    gap: 2rem;
}

.result-card {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    min-width: 0;
}

.prompt-box-wrapper {
    display: flex;
    flex-direction: column;
}

.prompt-output {
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 1.5rem;
    font-size: 1.05rem;
    color: var(--text-primary);
    min-height: 100px;
    white-space: pre-wrap;
    word-break: break-all;
    overflow-wrap: anywhere;
    font-family: inherit;
    transition: var(--transition-smooth);
    width: 100%;
    box-sizing: border-box;
}

.info-banner {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: rgba(16, 185, 129, 0.08);
    border: 1px solid rgba(16, 185, 129, 0.25);
    border-radius: 10px;
    padding: 0.8rem 1.2rem;
    font-size: 0.85rem;
    color: #a7f3d0;
}

.info-icon {
    width: 1.2rem;
    height: 1.2rem;
    color: var(--success);
    flex-shrink: 0;
}

/* ==========================================================================
Toast Notifications
========================================================================== */
.toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(16, 185, 129, 0.95);
    backdrop-filter: blur(10px);
    color: white;
    padding: 0.8rem 1.8rem;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
    display: flex;
    align-items: center;
    gap: 0.6rem;
    z-index: 1000;
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
    font-weight: 600;
}

.toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

.toast-icon {
    width: 1.2rem;
    height: 1.2rem;
}

.prompt-output.highlight {
    animation: highlightFade 0.6s ease-out;
}

@keyframes highlightFade {
    0% {
        box-shadow: 0 0 0 2px var(--accent-primary);
        background: rgba(99, 102, 241, 0.15);
    }
    100% {
        box-shadow: 0 0 0 0px transparent;
        background: rgba(0, 0, 0, 0.3);
    }
}

footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.8rem;
    margin-top: auto;
    padding-top: 2rem;
    border-top: 1px solid rgba(255, 255, 255, 0.03);
}
    
.param-val-en {
    display: none !important;
}
.history-card {
    display: none !important;
}
</style>

// ==========================================================================
// Application State & DOM Elements
// ==========================================================================
const runBtn = document.getElementById('run-btn');
const outputJa = document.getElementById('output-ja');
const copyJaBtn = document.getElementById('copy-ja-btn');
const specialRulesBanner = document.getElementById('special-rules-banner');
const specialRulesText = document.getElementById('special-rules-text');
const toastElement = document.getElementById('toast');
const toastMessage = document.getElementById('toast-message');

// ==========================================================================
// Logic Functions
// ==========================================================================

function generateComposition() {
    const choices = {};
    
    Object.keys(parameterData).forEach(key => {
        if (key === "H") return;
        
        const items = parameterData[key].items;
        const selectedIndex = Math.floor(Math.random() * items.length);
        choices[key] = {
            ja: items[selectedIndex].ja,
            en: items[selectedIndex].en,
            index: selectedIndex + 1
        };
    });

    const genderChoice = choices.A.ja;
    const isMale = genderChoice.includes("男子") || genderChoice.includes("男性");
    const hairList = isMale ? parameterData.H.male : parameterData.H.female;
    
    const selectedHairIndex = Math.floor(Math.random() * hairList.length);
    choices.H = {
        ja: hairList[selectedHairIndex].ja,
        en: hairList[selectedHairIndex].en,
        index: selectedHairIndex + 1
    };

    return choices;
}

function buildPrompts(choices) {
    const isMultiple = choices.L.ja.includes("複数");
    let promptJa = "";

    const elementsJaSingle = [
        `人物(素人・レッスン生): ${choices.A.ja} (特徴: ${choices.C.ja}, 髪型: ${choices.H.ja})`,
        `表情: ${choices.I.ja}`,
        `場所と雰囲気(機材含む): ${choices.B.ja}`,
        `アングル: ${choices.J.ja}`,
        `質感: ${choices.K.ja}`,
        `人数: ${choices.L.ja}`
    ];

    const fixedJaPrefix = "このブログ記事の内容をサムネイル化（※厳密に守る）、日本人（※厳密に守る）、写真生成（※厳密に守る）、文字は無し（※厳密に守る）、人物を中央配置（※厳密に守る）、カメラ目線NG（※厳密に守る）、背景にnayutasや文字と認識できるものNG（※厳密に守る）、頭の上と左右に十分な余白をとる（※厳密に守る）、スクエア(1:1)（※厳密に守る）";

    if (!isMultiple) {
        promptJa = `【ランダム要素構成】\n- ${elementsJaSingle.join('\n- ')}\n\n【固定プロンプト】\n・${fixedJaPrefix.split('、').join('\n・')}`;
    } else {
        const isStudentFemale = choices.A.ja.includes("女性") || choices.A.ja.includes("女子");
        const isStudentMale = choices.A.ja.includes("男性") || choices.A.ja.includes("男子");

        let instructorGender = "female";
        if (isStudentFemale) {
            instructorGender = "male";
        } else if (isStudentMale) {
            instructorGender = "female";
        } else {
            instructorGender = Math.random() > 0.5 ? "female" : "male";
        }

        const instructorAges = [
            { ja: "20代後半", en: "late 20s" },
            { ja: "30代", en: "30s" },
            { ja: "40代", en: "40s" }
        ];
        const chosenAge = instructorAges[Math.floor(Math.random() * instructorAges.length)];

        // プロっぽい専門的な講師の服装スタイル
        const instructorClothes = [
            { ja: "スマートなテーラードジャケットとインナーTシャツ（洗練されたプロ講師スタイル）", en: "smart tailored jacket with plain inner shirt, sleek professional instructor style" },
            { ja: "シックな黒のポロシャツ（スポーティーかつ洗練されたヴォーカルコーチスタイル）", en: "sleek black polo shirt, professional vocal coach appearance" },
            { ja: "上質なダーク系のオープンカラーシャツ（スタイリッシュな音響・音楽指導者スタイル）", en: "stylish dark open-collar shirt, professional music instructor look" },
            { ja: "シンプルで清潔感のあるきれいめシャツ（信頼感のあるプロインストラクタースタイル）", en: "clean button-up shirt, trustworthy professional teacher look" }
        ];
        const chosenClothes = instructorClothes[Math.floor(Math.random() * instructorClothes.length)];

        // プロっぽい指導ポーズ
        const instructorPoses = [
            { ja: "生徒の脇で丁寧な手振り（ハンドジェスチャー）を交え、正確な発声リズムや口の形を分かりやすく指導する", en: "standing beside the student, demonstrating correct vocal technique and mouth shape with clear professional hand gestures" },
            { ja: "キーボードや機材の前に座り、音程を確認しながら親身かつ的確にフィードバックを送る", en: "sitting near the keyboard, giving precise expert feedback with an encouraging expression" },
            { ja: "生徒の少し斜め後ろから、優しい笑顔でプロとしての温かい眼差しで見守り助言する", en: "standing slightly behind the student, watching over with a supportive professional smile and giving guidance" }
        ];
        const chosenPose = instructorPoses[Math.floor(Math.random() * instructorPoses.length)];

        const genderJa = instructorGender === "female" ? "女性" : "男性";

        const instructorJaDesc = `プロのボイストレーナー（${chosenAge.ja}${genderJa}、髪型: 清潔感と洗練されたプロスタイル、服装: ${chosenClothes.ja}、ポーズ: ${chosenPose.ja}）`;

        const elementsJaMultiple = [
            `手前の生徒(素人・主役): ${choices.A.ja} (特徴: ${choices.C.ja}, 髪型: ${choices.H.ja})`,
            `生徒の表情: ${choices.I.ja}`,
            `奥の講師(プロ指導者): ${instructorJaDesc}`,
            `場所と雰囲気(機材含む): ${choices.B.ja}`,
            `アングル: ${choices.J.ja}`,
            `質感: ${choices.K.ja}`,
            `二人の関係性: プロ講師によるボイストレーニングレッスン風景`,
            `ピント・顔描写: 講師の顔の描写が破綻したり極端にボケたりしないよう最適化 (${choices.K.ja.includes("背景ボケ") ? "奥はややソフトだが表情判別可能" : "両者にピント"})`
        ];

        promptJa = `【ランダム要素構成】\n- ${elementsJaMultiple.join('\n- ')}\n\n【固定プロンプト】\n・${fixedJaPrefix.split('、').join('\n・')}\n・本格的なボイトレレッスン風景2人構図`;
    }

    return {
        ja: promptJa,
        isMultiple: isMultiple
    };
}

function showToast(message) {
    toastMessage.textContent = message;
    toastElement.classList.add('show');
    setTimeout(() => {
        toastElement.classList.remove('show');
    }, 2500);
}

async function copyToClipboard(text, successMessage) {
    try {
        await navigator.clipboard.writeText(text);
        showToast(successMessage);
    } catch (err) {
        const textArea = document.createElement('textarea');
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        showToast(successMessage);
        document.body.removeChild(textArea);
    }
}

function handleExecution() {
    const choices = generateComposition();
    const prompts = buildPrompts(choices);
    
    outputJa.textContent = prompts.ja;
    outputJa.classList.add('highlight');
    setTimeout(() => {
        outputJa.classList.remove('highlight');
    }, 600);
    
    if (prompts.isMultiple) {
        specialRulesBanner.style.display = 'flex';
        specialRulesText.textContent = "「複数」ルール適用：奥の講師はプロのトレーナー仕様（ジャケット/ポロシャツ、的確な指導ポーズ、顔ボケなし）が適用されています。";
    } else {
        specialRulesBanner.style.display = 'none';
    }
    
    copyJaBtn.removeAttribute('disabled');
    
    showToast('プロンプトを生成しました！');
}

runBtn.addEventListener('click', handleExecution);

copyJaBtn.addEventListener('click', () => {
    copyToClipboard(outputJa.textContent, 'プロンプトをコピーしました！');
});

lucide.createIcons();
